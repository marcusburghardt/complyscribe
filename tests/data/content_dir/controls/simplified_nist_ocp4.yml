    notes: "Section a: Facilitation of information sharing is outside the scope\nof OpenShift configuration.\n\nSection b: Employment of technology or processes to assist users in making\ninformation sharing/collaboration decisions is outside\nthe scope of OpenShift configuration."
    rules: []
    description: "The organization:\na. Facilitates information sharing by enabling authorized users to determine whether access authorizations assigned to the sharing partner match the access restrictions on the information for [Assignment: organization-defined information sharing circumstances where user discretion is required]; and\nb. Employs [Assignment: organization-defined automated mechanisms or manual processes] to assist users in making information sharing/collaboration decisions.\n \nSupplemental Guidance: This control applies to information that may be restricted in some manner (e.g., privileged medical information, contract-sensitive information, proprietary information, personally identifiable information, classified information related to special access programs or compartments) based on some formal or administrative determination. Depending on the particular information-sharing circumstances, sharing partners may be defined at the individual, group, or organizational level.\
      \ Information may be defined by content, type, security category, or special access program/compartment. Related control: AC-3.\n\nReferences: None."
    title: AC-21 - INFORMATION SHARING
    levels:
      - high
      - moderate
  - id: AC-21(1)
    status: not applicable
    notes: "Enforcement of information-sharing decisions is outside\nthe scope of OpenShift configuration."
    rules: []
  - id: AC-21(2)
    status: not applicable
    notes: "Implementation of information search and retrieval services\nthat enforce organization-defined information sharing restrictions\nis outside the scope of OpenShift configuration."
    rules: []
  - id: AC-22
    status: not applicable
    notes: "Section a: Organizational processes regarding the designation of individuals\nauthorized to post information onto a publicly accessible information\nsystem is outside the scope of OpenShift configuration.\n\nSection b: Training authorized individuals to ensure that publicly accessible\ninformation does not contain nonpublic information is outside the\nscope of OpenShift configuration.\n\nSection c: Reviewing the proposed content of information prior to posting onto\nthe publicly accessible information system to ensure that nonpublic\ninformation is not included is outside the scope of OpenShift\nconfiguration.\n\nSection d: Reviewing content on the publicly accessible information system\nfor nonpublic information at an organization-defined frequency and\nremoval of such information, if discovered, is outside the scope of\nOpenShift configuration."
    rules: []
    description: "The organization:\n a. Designates individuals authorized to post information onto a publicly accessible information system;\n b. Trains authorized individuals to ensure that publicly accessible information does not contain nonpublic information;\n c. Reviews the proposed content of information prior to posting onto the publicly accessible information system to ensure that nonpublic information is not included; and\n d. Reviews the content on the publicly accessible information system for nonpublic information [Assignment: organization-defined frequency] and removes such information, if discovered.\n\nSupplemental Guidance:  In accordance with federal laws, Executive Orders, directives, policies, regulations, standards, and/or guidance, the general public is not authorized access to nonpublic information (e.g., information protected under the Privacy Act and proprietary information). This control addresses information systems that are controlled by the organization and accessible\
      \ to the general public, typically without identification or authentication. The posting of information on\nnon-organization information systems is covered by organizational policy. Related controls: AC-3, AC-4, AT-2, AT-3, AU-13.\n\nControl Enhancements: None.\n\nReferences: None.\n\nAC-22 (d) [at least quarterly]"
