  - id: AC-20
    status: not applicable
    notes: "Section a: Organizational processes for establishing terms and conditions\nfor accessing the information system from external information\nsystems is outside the scope of OpenShift configuration.\n\nSection b: Organizational processes for establishing terms and conditions\nfor the processing, storage, or transmission of organization-controlled\ninformation using external information systems is outside the scope\nof OpenShift configuration."
    rules: []
    description: "The organization establishes terms and conditions, consistent with any trust relationships established with other organizations owning, operating, and/or maintaining external information systems, allowing authorized individuals to:\n a. Access the information system from external information systems; and\n b. Process, store, or transmit organization-controlled information using external information systems.\n\nSupplemental Guidance:  External information systems are information systems or components of information systems that are outside of the authorization boundary established by organizations and for which organizations typically have no direct supervision and authority over the application of required security controls or the assessment of control effectiveness. External information systems include, for example: (i) personally owned information systems/devices (e.g., notebook computers, smart phones, tablets, personal digital assistants); (ii) privately owned computing\
      \ and communications devices resident in commercial or public facilities (e.g., hotels, train stations, convention centers, shopping malls, or airports); (iii) information systems owned or controlled by nonfederal governmental organizations; and (iv) federal information systems that are not owned by, operated by, or under the direct supervision and authority of organizations. This control also addresses the use of external information systems for the processing, storage, or transmission of\norganizational information, including, for example, accessing cloud services (e.g., infrastructure as a service, platform as a service, or software as a service) from organizational information systems.\n\nFor some external information systems (i.e., information systems operated by other federal agencies, including organizations subordinate to those agencies), the trust relationships that have been established between those organizations and the originating organization may be such, that no explicit\
      \ terms and conditions are required. Information systems within these organizations\nwould not be considered external. These situations occur when, for example, there are pre-existing sharing/trust agreements (either implicit or explicit) established between federal agencies or organizations subordinate to those agencies, or when such trust agreements are specified by applicable laws, Executive Orders, directives, or policies. Authorized individuals include, for example, organizational personnel, contractors, or other individuals with authorized access to organizational information systems and over which organizations have the authority to impose rules of behavior with regard to system access. Restrictions that organizations impose on authorized individuals need not be uniform, as those restrictions may vary depending upon the\ntrust relationships between organizations. Therefore, organizations may choose to impose different security restrictions on contractors than on state, local,\
      \ or tribal governments.\n\nThis control does not apply to the use of external information systems to access public interfaces to organizational information systems (e.g., individuals accessing federal information through www.usa.gov). Organizations establish terms and conditions for the use of external information systems in accordance with organizational security policies and procedures. Terms and conditions address as a minimum: types of applications that can be accessed on organizational information systems from external information systems; and the highest security category of information that can be processed, stored, or transmitted on external information systems. If terms and conditions with the owners of external information systems cannot be established, organizations may impose restrictions on organizational personnel using those external systems. Related controls: AC-3, AC-17, AC-19, CA-3, PL-4, SA-9.\n\nReferences: FIPS Publication 199."
    title: AC-20 - USE OF EXTERNAL INFORMATION SYSTEMS
    levels:
      - high
      - moderate
      - low
  - id: AC-20(1)
    status: not applicable
    notes: "Section a: Verification of security control implementation on external systems\nis outside the scope of OpenShift configuration.\n\nSection b: Retention of approved information system connection or processing\nagreements with organizational entities hosting the external\ninformation system is outside the scope of OpenShift configuration."
    rules: []
    description: "The organization permits authorized individuals to use an external information system to access the information system or to process, store, or transmit organization-controlled information only when the organization:\n (a)   Verifies the implementation of required security controls on the external system as specified in the organization’s information security policy and security plan; or\n (b)   Retains approved information system connection or processing agreements with the organizational entity hosting the external information system.\n\nSupplemental Guidance:  This control enhancement recognizes that there are circumstances where individuals using external information systems (e.g., contractors, coalition partners) need to access organizational information systems. In those situations, organizations need confidence that the external information systems contain the necessary security safeguards (i.e., security controls), so as not to compromise, damage, or otherwise harm\
      \ organizational information systems. Verification that the required security controls have been implemented can be achieved, for example, by third-party, independent assessments, attestations, or other means, depending on the confidence level required by organizations. Related control: CA-2."
    title: AC-20(1) - USE OF EXTERNAL INFORMATION SYSTEMS | LIMITS ON AUTHORIZED USE
    levels:
      - high
      - moderate
  - id: AC-20(2)
    status: not applicable
    notes: "Organizational processes regarding the restriction or\nprohibiting of the use of organization-controlled portable\nstorage devices by authorized individuals on external information\nsystems is outside the scope of OpenShift configuration."
