  - id: AC-10
    status: pending
    notes: "The customer will be responsible for limiting the number of\nconcurrent sessions to the customer application as required.\nA successful control implemented will need to address the technical\nmechanism used to enforce this limit.\n\nAt the moment, the OpenShift OAuth server does not support\nlimiting the number of concurrent logins. This work is scheduled\nfor OpenShift in https://issues.redhat.com/browse/RFE-48"
    rules: []
    description: "The information system limits the number of concurrent sessions for each [Assignment: organization-defined account and/or account type] to [Assignment: organization-defined number].\n\nSupplemental Guidance:  Organizations may define the maximum number of concurrent sessions for information system accounts globally, by account type (e.g., privileged user, non-privileged user, domain, specific application), by account, or a combination. For example, organizations may limit the number of concurrent sessions for system administrators or individuals working in particularly sensitive domains or mission-critical applications. This control addresses concurrent sessions for information system accounts and does not address concurrent sessions by single users via multiple system accounts.\n\nControl Enhancements:  None.\n\nReferences: None.\n\n\nAC-10-2 [three (3) sessions for privileged access and two (2) sessions for non-privileged access]"
    title: AC-10 - CONCURRENT SESSION CONTROL
    levels:
      - high
      - moderate
  - id: AC-11
    status: not applicable
    notes: "Section a: A session lock must be configured with the device that is used\nto access Red Hat OpenShift.\n\nSee also AC-2(5) for information on configuring inactivity timeout.\n\nSection b: A session lock must be configured with the device that is used\nto access Red Hat OpenShift.\n\nSee also AC-2(5) for information on configuring inactivity timeout."
    rules: []
    description: "The information system:\n a. Prevents further access to the system by initiating a session lock after [Assignment: organization-defined time period] of inactivity or upon receiving a request from a user; and\n b. Retains the session lock until the user reestablishes access using established identification and authentication procedures.\n\nSupplemental Guidance:  Session locks are temporary actions taken when users stop work and move away from the immediate vicinity of information systems but do not want to log out because of the temporary nature of their absences. Session locks are implemented where session activities can be determined. This is typically at the operating system level, but can also be at the application level. Session locks are not an acceptable substitute for logging out of information systems, for example, if organizations require users to log out at the end of workdays. Related control: AC-7.\n\nReferences: OMB Memorandum 06-16.\n\nAC-11(a) [fifteen (15)\
      \ minutes]"
    title: AC-11 - SESSION LOCK
    levels:
      - high
      - moderate
  - id: AC-11(1)
    status: not applicable
    notes: "A session lock must be configured with the device that is used\nto access Red Hat OpenShift.\n\nSee also AC-2(5) for information on configuring inactivity timeout."
    rules: []
    description: "The information system conceals, via the session lock, information previously visible on the display with a publicly viewable image.\n\nSupplemental Guidance:  Publicly viewable images can include static or dynamic images, for example, patterns used with screen savers, photographic images, solid colors, clock, battery life indicator, or a blank screen, with the additional caveat that none of the images convey sensitive information.\n\nReferences:  OMB Memorandum 06-16."
    title: AC-11(1) - SESSION LOCK | PATTERN-HIDING DISPLAYS
    levels:
      - high
      - moderate
  - id: AC-12
    status: automated
    notes: "The customer will be responsible for defining events or conditions\nrequiring disconnection (for example, user requesting logout),\nand for terminating the session when those events or conditions\narise. Because a very common condition is to disconnect a user\nafter a certain period of time, this control response describes\nhow to configure the internal OAuth server’s token duration.\n\nTo meet the requirements, OpenShift must be configured\nto use centralized authentication via an IDP. The token\nduration can be then be configured globally:\nhttps://docs.openshift.com/container-platform/latest/authentication/configuring-internal-oauth.html#oauth-configuring-internal-oauth_configuring-internal-oauth\n\nOr per client:\nhttps://docs.openshift.com/container-platform/4.7/rest_api/oauth_apis/oauthclient-oauth-openshift-io-v1.html#oauthclient-oauth-openshift-io-v1\n\nNote that the global configuration does not change the configuration\nof the oauthclient objects, so for proper compliance\
      \ check, both must\nbe audited.\n\nAlso note that prior to OpenShift 4.8, changing the global oauth.config\nobject triggers a rollout of the kube-apiserver which can take up\nto 15 minutes. You can watch the kube-apiserver rollout with\n\"oc get co kube-apiserver\". Once the rollout finishes, the \"Progressing\"\ncolumn will say \"False\"."
    rules:
      - oauth_or_oauthclient_token_maxage
    description: "The information system automatically terminates a user session after [Assignment: organization-defined conditions or trigger events requiring session disconnect].\n\nSupplemental Guidance:  This control addresses the termination of user-initiated logical sessions in contrast to SC-10 which addresses the termination of network connections that are associated with communications sessions (i.e., network disconnect). A logical session (for local, network, and remote access) is initiated whenever a user (or process acting on behalf of a user) accesses an organizational information system. Such user sessions can be terminated (and thus terminate user access) without terminating network sessions. Session termination terminates all processes associated with a user’s logical session except those processes that are specifically created by the user (i.e., session owner) to continue after the session is terminated. Conditions or trigger events requiring automatic session termination\
      \ can include, for example, organization-defined periods of user inactivity, targeted responses to certain types of incidents, time-of-day restrictions on information system use. Related controls: SC-10, SC-23.\n\nReferences: None."
    title: AC-12 - SESSION TERMINATION
    levels:
      - high
      - moderate
  - id: AC-12(1)
    status: partial
    notes: "With any authentication mechanism the ability to revoke credentials if they\nare compromised or no longer required, is a key control. Kubernetes client\ncertificate authentication does not allow for this due to a lack of support\nfor certificate revocation.\n\nOpenShift's built-in OAuth server allows credential revocation by relying on\nthe Identity provider, as well as giving the administrators the ability to\nrevoke any tokens given to a specific user.\n\nThe OpenShift does not have the logout capability when cert is being used with\nthe default kubeadmin account, therefore we need to check if kubeadmin account\nis disabled.\n\nSection b: A RFE has been filed. Progress can be tracked via: \n\nhttps://issues.redhat.com/browse/RFE-2645"
    rules:
      - idp_is_configured
      - kubeadmin_removed
    description: "The information system:\n (a)   Provides a logout capability for user-initiated communications sessions whenever authentication is used to gain access to [Assignment: organization-defined information resources]; and\n (b)   Displays an explicit logout message to users indicating the reliable termination of authenticated communications sessions.\n\nSupplemental Guidance:  Information resources to which users gain access via authentication include, for example, local workstations, databases, and password-protected websites/web- based services. Logout messages for web page access, for example, can be displayed after authenticated sessions have been terminated. However, for some types of interactive sessions including, for example, file transfer protocol (FTP) sessions, information systems typically send logout messages as final messages prior to terminating sessions.\n\nAC-12 (1) Guidance: https://www.owasp.org/index.php/Testing_for_logout_functionality_%28OTG-SESS-006%29"
    title: AC-12(1) - SESSION TERMINATION | USER-INITIATED LOGOUTS / MESSAGE DISPLAYS
    levels:
      - high
  - id: AC-13
    status: not applicable
    notes: This control was withdrawn by NIST.
