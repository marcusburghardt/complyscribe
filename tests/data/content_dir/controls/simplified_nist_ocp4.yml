  - id: AC-17(9)
    status: inherently met
    notes: "This control is inherently met by Red Hat OpenShift.\n\nOpenShift nodes may be placed into Maintenance Mode. This\ndesignation will migrate applications from a given cluster node to\nanother, disconnecting any active sessions to a given cluster node.\n\nIf immediate disconnect of all hosted applications are desired,\nindividual containers may be halted. This will disconnect user sessions\nfor tenant applications immediately.\n\nIn order to disconnect all users, delete all OAuth tokens:\n$ oc delete oauthaccesstoken --all\n\nSince neither Kubernetes nor Red Hat OpenShift support CRLs or\nOSCP, the advice is not to use x509 certificates. If certificates\nmust absolutely be used, use very short-lived certificates and\nas a last resort, instead of preventing authentication, remove all\nRBAC rules associated with accounts that possess x509 certificates."
    rules: []
    description: "The organization provides the capability to expeditiously disconnect or disable remote access to the information system within [Assignment: organization-defined time period].\n\nSupplemental Guidance:  This control enhancement requires organizations to have the capability to rapidly disconnect current users remotely accessing the information system and/or disable further remote access. The speed of disconnect or disablement varies based on the criticality of missions/business functions and the need to eliminate immediate or future remote access to organizational information systems.\n\nAC-17 (9) [fifteen (15) minutes]"
    title: AC-17(9) - REMOTE ACCESS | DISCONNECT / DISABLE ACCESS
    levels:
      - high
      - moderate
