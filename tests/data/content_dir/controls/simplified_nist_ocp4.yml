    status: pending
    notes: "A control response is planned. Progress can be tracked via:\n\nhttps://issues.redhat.com/browse/CMP-119"
    rules: []
  - id: AC-6(7)
    status: not applicable
    notes: "Reviews and manage the privileges assigned to user is an organization control.\n\nHowever to facilitate a control response, using Role Based Access Control (RBAC),\nOpenShift roles can be used to grant various levels of access both cluster-wide as well as at\nthe project scope. Users and groups can be associated with, or bound\nto, multiple roles at the same time.\n\nFor service accounts that might also have privileged access, Security\nContext Constraints (SCC) should be used to limit privileged actions\nin service accounts.\n\nFor the cluster, the kubeadmin user should be completely disabled.\n\nMore information on RBAC can be viewed at:\nhttps://docs.openshift.com/container-platform/latest/authentication/using-rbac.html\n\nMore information for SCC can be viewed at:\nhttps://docs.openshift.com/container-platform/latest/authentication/managing-security-context-constraints.html\nSection b: The organization monitoring privileged role assignments is an organizational"
    rules: []
    description: "The organization:\n (a)   Reviews [Assignment: organization-defined frequency] the privileges assigned to [Assignment: organization-defined roles or classes of users] to validate the need for such privileges; and\n (b)   Reassigns or removes privileges, if necessary, to correctly reflect organizational mission/business needs.\n\nSupplemental Guidance:  The need for certain assigned user privileges may change over time reflecting changes in organizational missions/business function, environments of operation, technologies, or threat. Periodic review of assigned user privileges is necessary to determine if the rationale for assigning such privileges remains valid. If the need cannot be revalidated, organizations take appropriate corrective actions. Related control: CA-7.\n\nAC-6 (7)(a)-1  at a minimum, annually\nAC-6 (7)(a)-2  all users with privileges"
    title: AC-6(7) - LEAST PRIVILEGE | REVIEW OF USER PRIVILEGES
    levels:
      - high
  - id: AC-6(8)
    status: supported
    notes: "Red Hat OpenShift provides security context constraints (SCC) [1] that control permissions for actions that a pod can perform and what resources a pod can access. \n\nRed Hat OpenShift does an admission control inspection for pods based on the capabilities granted to a user [2].\n\nHowever to assist in developing and handling SCC to address this control [3], use of Role-based Access Control (RBAC) [4] and the architecture of OpenShift provide logical access restrictions based on user and group roles in addition to logical separation of systems and components [5].\n\n[1] https://docs.openshift.com/container-platform/latest/authentication/managing-security-context-constraints.html\n\n[2] https://docs.openshift.com/container-platform/latest/authentication/managing-security-context-constraints.html#admission_configuring-internal-oauth\n\n[3] https://docs.openshift.com/container-platform/latest/authentication/managing-security-context-constraints.html#role-based-access-to-ssc_configuring-internal-oauth\n\
      \n[4] https://docs.openshift.com/container-platform/latest/authentication/using-rbac.html\n\n[5] https://docs.openshift.com/container-platform/latest/architecture/architecture.html"
    rules: []
    description: "The information system prevents [Assignment: organization-defined software] from executing at higher privilege levels than users executing the software.\n\nSupplemental Guidance:  In certain situations, software applications/programs need to execute with elevated privileges to perform required functions. However, if the privileges required for execution are at a higher level than the privileges assigned to organizational users invoking such applications/programs, those users are indirectly provided with greater privileges than assigned by organizations.\n\nAC-6 (8) [any software except software explicitly documented]"
    title: AC-6(8) - LEAST PRIVILEGE | PRIVILEGE LEVELS FOR CODE EXECUTION
    levels:
      - high
  - id: AC-6(9)
    status: automated
    notes: "OpenShift performs audit logging by default, which makes this\ncontrol inherently met.\n\nWhat constitutes an action by an admin role must be synthetized in a\nSIEM, though. OCP audit logs do specify the RBAC rule that allowed the action\nand the identity that requested the action.\n\nSee https://docs.openshift.com/container-platform/latest/security/audit-log-view.html\nfor documentation on how to view the audit logs and\nhttps://docs.openshift.com/container-platform/latest/security/audit-log-policy-config.html\nfor information on configuring the audit logging."
    rules:
      - directory_access_var_log_kube_audit
      - directory_access_var_log_oauth_audit
      - directory_access_var_log_ocp_audit
    description: "The information system audits the execution of privileged functions.\n\nSupplemental Guidance:  Misuse of privileged functions, either intentionally or unintentionally by authorized users, or by unauthorized external entities that have compromised information system accounts, is a serious and ongoing concern and can have significant adverse impacts on organizations. Auditing the use of privileged functions is one way to detect such misuse, and in doing so, help mitigate the risk from insider threats and the advanced persistent threat (APT). Related control: AU-2."
    title: AC-6(9) - LEAST PRIVILEGE | AUDITING USE OF PRIVILEGED FUNCTIONS
    levels:
      - high
      - moderate
  - id: AC-6(10)
    status: inherently met
    notes: "This control is inherently met through the use of Role-based Access Control\nand SCCs."
    rules: []
    description: "The information system prevents non-privileged users from executing privileged functions to include disabling, circumventing, or altering implemented security safeguards/countermeasures.\n\nSupplemental Guidance:  Privileged functions include, for example, establishing information system accounts, performing system integrity checks, or administering cryptographic key management activities. Non-privileged users are individuals that do not possess appropriate authorizations. Circumventing intrusion detection and prevention mechanisms or malicious code protection mechanisms are examples of privileged functions that require protection from non-privileged users."
    title: AC-6(10) - LEAST PRIVILEGE | PROHIBIT NON-PRIVILEGED USERS FROM EXECUTING PRIVILEGED FUNCTIONS
    levels:
      - high
      - moderate
  - id: AC-7
    status: automated
    notes: "Section a: To meet the requirements, OpenShift must be configured\nto use centralized authentication via an IDP. The limit\non consecutive failed login attempts must then be set\non the IDP side.\n\nNote that the using the htpasswd IDP type cannot cover this\ncontrol, therefore using htpasswd based IDPs should render\nthe system non-compliant.\n\nTo configure an IdP, see https://docs.openshift.com/container-platform/latest/authentication/understanding-identity-provider.html\n\nSection b: To meet the requirements, OpenShift must be configured\nto use centralized authentication via an IDP. The account\nlock or delay until next login prompt must then be set\non the IDP side.\n\nNote that the using the htpasswd IDP type cannot cover this\ncontrol, therefore using htpasswd based IDPs should render\nthe system non-compliant.\n\nTo configure an IdP, see https://docs.openshift.com/container-platform/latest/authentication/understanding-identity-provider.html\nThe customer will be responsible\
      \ for taking required\nactions defined by the customer, upon account lockout."
    rules:
      - ocp_idp_no_htpasswd
      - idp_is_configured
    description: "The information system:\n a. Enforces a limit of [Assignment: organization-defined number] consecutive invalid logon attempts by a user during a [Assignment: organization-defined time period]; and\n b. Automatically [Selection: locks the account/node for an [Assignment: organization-defined time period]; locks the account/node until released by an administrator; delays next logon prompt according to [Assignment: organization-defined delay algorithm]] when the maximum number of unsuccessful attempts is exceeded.\n\nSupplemental Guidance:  This control applies regardless of whether the logon occurs via a local or network connection. Due to the potential for denial of service, automatic lockouts initiated by information systems are usually temporary and automatically release after a predetermined time period established by organizations. If a delay algorithm is selected, organizations may choose to employ different algorithms for different information system components based\
      \ on the capabilities of those components. Responses to unsuccessful logon attempts may be implemented at both the operating system and the application levels. Related controls: AC-2, AC-9, AC-14, IA-5.\n\nReferences: None.\n\nAC-7(a)-1 [not more than three (3)]\n \nAC-7(a)-2 [fifteen (15) minutes] \n\nAC-7(b) [locks the account/node for a minimum of three (3) hours or until unlocked by an administrator]"
    title: AC-7 - UNSUCCESSFUL LOGON ATTEMPTS
    levels:
      - high
      - moderate
      - low
