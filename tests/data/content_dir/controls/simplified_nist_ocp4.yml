    notes: "Section a: Authorizing the execution of privileged commands and access to security-relevant\ninformation via remote access only for organizational defined needs is an\norganizational control outside the scope of OpenShift configuration.\n\nSection b: Documenting the rationale for the execution of privileged commands and access to\nsecurity-relevant information via remote access in the security plan for the\ninformation system is an organizational control outside the scope of OpenShift\nconfiguration."
    rules: []
    description: "The organization:\n (a)   Authorizes the execution of privileged commands and access to security-relevant information via remote access only for [Assignment: organization-defined needs]; and\n (b)   Documents the rationale for such access in the security plan for the information system.\n\nSupplemental Guidance:  Related control: AC-6."
