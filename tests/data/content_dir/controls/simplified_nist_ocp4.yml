    status: not applicable
    notes: "Restricting privileged accounts to organization-defined personnel\nor roles is outside the scope of OpenShift configuration, therefore\nAC-6(5) is an organizational control."
    rules: []
    description: "The organization restricts privileged accounts on the information system to [Assignment:\norganization-defined personnel or roles].\n\nSupplemental Guidance:  Privileged accounts, including super user accounts, are typically described as system administrator for various types of commercial off-the-shelf operating systems. Restricting privileged accounts to specific personnel or roles prevents day-to-day users from having access to privileged information/functions. Organizations may differentiate in the application of this control enhancement between allowed privileges for local accounts and for domain accounts provided organizations retain the ability to control information system configurations for key security parameters and as otherwise necessary to sufficiently mitigate risk. Related control: CM-6."
    title: AC-6(5) - LEAST PRIVILEGE | PRIVILEGED ACCOUNTS
    levels:
      - high
      - moderate
