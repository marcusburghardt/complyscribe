  - id: AC-17
    status: not applicable
    notes: "Section a: This control reflects organizational procedures/policies, and is not\napplicable to the configuration of OpenShift.\n\nSection b: This control reflects organizational procedures/policies, and is not\napplicable to the configuration of OpenShift."
    rules: []
    description: "The organization:\n a. Establishes and documents usage restrictions, configuration/connection requirements, and implementation guidance for each type of remote access allowed; and\n b. Authorizes remote access to the information system prior to allowing such connections.\n\nSupplemental Guidance:  Remote access is access to organizational information systems by users (or processes acting on behalf of users) communicating through external networks (e.g., the Internet). Remote access methods include, for example, dial-up, broadband, and wireless. Organizations often employ encrypted virtual private networks (VPNs) to enhance confidentiality and integrity over remote connections. The use of encrypted VPNs does not make the access non-remote; however, the use of VPNs, when adequately provisioned with appropriate security controls (e.g., employing appropriate encryption techniques for confidentiality and integrity protection) may provide sufficient assurance to the organization\
      \ that it can effectively treat such connections as internal networks. Still, VPN connections traverse external networks, and the encrypted VPN does not enhance the availability of remote connections. Also, VPNs with encrypted tunnels can affect the organizational capability to adequately monitor network communications traffic for malicious code. Remote access controls apply to information systems other than public web servers or systems designed for public access. This control addresses authorization prior to allowing remote access without specifying the formats for such authorization. While organizations may use interconnection security agreements to authorize remote access connections, such agreements are not required by this control. Enforcing access restrictions for remote connections is addressed in AC-3. Related controls: AC-2, AC-3, AC-18, AC-19, AC-20, CA-3, CA-7, CM-8, IA-2, IA-3, IA-8, MA-4, PE-17, PL-4, SC-10, SI-4.\n\nReferences: NIST Special Publications 800-46, 800-77,\
      \ 800-113, 800-114, 800-121."
    title: AC-17 - REMOTE ACCESS
    levels:
      - high
      - moderate
      - low
  - id: AC-17(1)
    status: not applicable
    notes: This is an organizational control outside the scope of OpenShift configuration.
    rules: []
    description: "The information system monitors and controls remote access methods.\n\nSupplemental Guidance:  Automated monitoring and control of remote access sessions allows organizations to detect cyber attacks and also ensure ongoing compliance with remote access policies by auditing connection activities of remote users on a variety of information system components (e.g., servers, workstations, notebook computers, smart phones, and tablets). Related controls: AU-2, AU-12."
    title: AC-17(1) - REMOTE ACCESS | AUTOMATED MONITORING / CONTROL
    levels:
      - high
      - moderate
  - id: AC-17(2)
    status: automated
    notes: "Beginning with OpenShift 4.3, when OpenShift is deployed on Red Hat Enterprise\nLinux, and FIPS is enabled as a kernel setting, OpenShift will use OpenSSL\nlibraries instead of the native Golang crypto. The system operator will need to\nverify that OpenShift is being deployed on a version of Red Hat Enterprise Linux\nthat has been FIPS validated."
    rules:
      - fips_mode_enabled_on_all_nodes
    description: "The information system implements cryptographic mechanisms to protect the confidentiality and integrity of remote access sessions.\n\nSupplemental Guidance:  The encryption strength of mechanism is selected based on the security categorization of the information. Related controls: SC-8, SC-12, SC-13."
    title: AC-17(2) - REMOTE ACCESS | PROTECTION OF CONFIDENTIALITY / INTEGRITY USING ENCRYPTION
    levels:
      - high
      - moderate
  - id: AC-17(3)
    status: automated
    notes: "The customer will be responsible for requiring remote access\nconnections to the customer application to be routed through\ncustomer-defined network access control points. A successful control\nresponse will need to address the nature, number, and location of\nsuch access control points, as well as the security controls in place\nto protect those access control points.\n\nManaged access points can be created and configured through the use of\nbastion hosts, ingress rule(s), and/or opening a route to a new access point.\n\nDocumentation for creating and using a bastion host can be viewed at:\n\nhttps://docs.openshift.com/container-platform/latest/networking/accessing-hosts.html\n\nDocumentation for creating an ingress rule can be viewed at:\n\nhttps://docs.openshift.com/container-platform/latest/networking/configuring_ingress_cluster_traffic/overview-traffic.html\n\nDocumentation for creating a route can be viewed at:\n\nhttps://docs.openshift.com/container-platform/latest/networking/routes/route-configuration.html"
    rules:
      - routes_protected_by_tls
    description: "The information system routes all remote accesses through [Assignment: organization-defined number] managed network access control points.\n\nSupplemental Guidance:  Limiting the number of access control points for remote accesses reduces the attack surface for organizations. Organizations consider the Trusted Internet Connections (TIC) initiative requirements for external network connections. Related control: SC-7."
    title: AC-17(3) - REMOTE ACCESS | MANAGED ACCESS CONTROL POINTS
    levels:
      - high
      - moderate
