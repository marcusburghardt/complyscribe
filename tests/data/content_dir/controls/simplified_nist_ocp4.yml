  - id: AT-1
    status: not applicable
    notes: "Section a: This control reflects organizational procedure/policy and is not\napplicable to component-level configuration.\n\nSection b: This control reflects organizational procedure/policy and is not\napplicable to component-level configuration."
    rules: []
    description: "The organization:\n a. Develops, documents, and disseminates to [Assignment: organization-defined personnel or roles]:\n   1. A security awareness and training policy that addresses purpose, scope, roles, responsibilities, management commitment, coordination among organizational entities, and compliance; and\n   2.  Procedures to facilitate the implementation of the security awareness and training policy and associated security awareness and training controls; and\n b. Reviews and updates the current:\n   1. Security awareness and training policy [Assignment: organization-defined frequency]; and\n   2.  Security awareness and training procedures [Assignment: organization-defined frequency].\n\nSupplemental Guidance:  This control addresses the establishment of policy and procedures for the effective implementation of selected security controls and control enhancements in the AT family. Policy and procedures reflect applicable federal laws, Executive Orders, directives,\
      \ regulations, policies, standards, and guidance. Security program policies and procedures at the organization level may make the need for system-specific policies and procedures unnecessary. The policy can be included as part of the general information security policy for organizations or conversely, can be represented by multiple policies reflecting the complex nature of certain organizations. The procedures can be established for the security program in general and for particular information systems, if needed. The organizational risk management strategy is a key factor in establishing policy and procedures. Related control: PM-9.\n\nControl Enhancements:  None.\n\nReferences:  NIST Special Publications 800-12, 800-16, 800-50, 800-100.\n\nAT-1 (b) (1) [at least annually or whenever a significant change occurs] \nAT-1 (b) (2) [at least annually or whenever a significant change occurs]"
    title: AT-1 - SECURITY AWARENESS AND TRAINING POLICY AND PROCEDURES
    levels:
      - high
      - moderate
      - low
  - id: AT-2
    status: not applicable
    notes: "Section a: This control reflects organizational procedure/policy and is not\napplicable to component-level configuration.\n\nSection b: This control reflects organizational procedure/policy and is not\napplicable to component-level configuration.\n\nSection c: This control reflects organizational procedure/policy and is not\napplicable to component-level configuration."
    rules: []
    description: "The organization provides basic security awareness training to information system users (including managers, senior executives, and contractors):\n a. As part of initial training for new users;\n b. When required by information system changes; and\n c. [Assignment: organization-defined frequency] thereafter.\n\nSupplemental Guidance:  Organizations determine the appropriate content of security awareness training and security awareness techniques based on the specific organizational requirements and the information systems to which personnel have authorized access. The content includes a basic understanding of the need for information security and user actions to maintain security and to respond to suspected security incidents. The content also addresses awareness of the need for operations security. Security awareness techniques can include, for example, displaying posters, offering supplies inscribed with security reminders, generating email advisories/notices from senior\
      \ organizational officials, displaying logon screen messages, and conducting information security awareness events. Related controls: AT-3, AT-4, PL-4.\n\nReferences: C.F.R. Part 5 Subpart C (5 C.F.R. 930.301); Executive Order 13587; NIST Special Publication 800-50.\n\nAT-2 (c) [at least annually]"
    title: AT-2 - SECURITY AWARENESS TRAINING
    levels:
      - high
      - moderate
      - low
  - id: AT-2(1)
    status: not applicable
    notes: "This control reflects organizational procedure/policy and is not\napplicable to component-level configuration."
    rules: []
  - id: AT-2(2)
    status: not applicable
    notes: "This control reflects organizational procedure/policy and is not\napplicable to component-level configuration."
    rules: []
    description: "The organization includes security awareness training on recognizing and reporting potential indicators of insider threat.\n\nSupplemental Guidance:  Potential indicators and possible precursors of insider threat can include behaviors such as inordinate, long-term job dissatisfaction, attempts to gain access to information not required for job performance, unexplained access to financial resources, bullying or sexual harassment of fellow employees, workplace violence, and other serious violations of organizational policies, procedures, directives, rules, or practices. Security awareness training includes how to communicate employee and management concerns regarding potential indicators of insider threat through appropriate organizational channels in accordance with established organizational policies and procedures. Related controls: PL-4, PM-12, PS-3, PS-6.\n\nReferences:  C.F.R. Part 5 Subpart C (5 C.F.R 930.301); Executive Order 13587; NIST Special Publication 800-50."
    title: AT-2(2) - SECURITY AWARENESS | INSIDER THREAT
    levels:
      - high
      - moderate
  - id: AT-3
    status: not applicable
    notes: "Section a: This control reflects organizational procedure/policy and is not\napplicable to component-level configuration.\n\nSection b: This control reflects organizational procedure/policy and is not\napplicable to component-level configuration.\n\nSection c: This control reflects organizational procedure/policy and is not\napplicable to component-level configuration."
    rules: []
    description: "The organization provides role-based security training to personnel with assigned security roles and responsibilities:\na. Before authorizing access to the information system or performing assigned duties;\nb. When required by information system changes; and\nc. [Assignment: organization-defined frequency] thereafter.\n\nSupplemental Guidance:  Organizations determine the appropriate content of security training based on the assigned roles and responsibilities of individuals and the specific security requirements of organizations and the information systems to which personnel have authorized access. In addition, organizations provide enterprise architects, information system developers, software developers, acquisition/procurement officials, information system managers, system/network administrators, personnel conducting configuration management and auditing activities, personnel performing independent verification and validation activities, security control assessors,\
      \ and other personnel having access to system-level software, adequate security-related technical training specifically tailored for their assigned duties. Comprehensive role-based training addresses management, operational, and technical roles and responsibilities covering physical, personnel, and technical safeguards and countermeasures. Such training can include for example, policies, procedures, tools, and artifacts for the organizational security roles defined. Organizations also provide the training necessary for individuals to carry out their responsibilities related to operations and\nsupply chain security within the context of organizational information security programs. Role-based security training also applies to contractors providing services to federal agencies. Related controls: AT-2, AT-4, PL-4, PS-7, SA-3, SA-12, SA-16.\n\nReferences: C.F.R. Part 5 Subpart C (5 C.F.R. 930.301); NIST Special Publications 800-16, 800-50.\n\nAT-3 (c) [at least annually]"
    title: AT-3 - ROLE-BASED SECURITY TRAINING
    levels:
      - high
      - moderate
      - low
  - id: AT-3(1)
    status: not applicable
    notes: "This control reflects organizational procedure/policy and is not\napplicable to component-level configuration."
    rules: []
  - id: AT-3(2)
    status: not applicable
    notes: "This control reflects organizational procedure/policy and is not\napplicable to component-level configuration."
    rules: []
  - id: AT-3(3)
    status: not applicable
    notes: "This control reflects organizational procedure/policy and is not\napplicable to component-level configuration."
    rules: []
    description: "The organization includes practical exercises in security training that reinforce training objectives.\n\nSupplemental Guidance:  Practical exercises may include, for example, security training for software developers that includes simulated cyber attacks exploiting common software vulnerabilities (e.g., buffer overflows), or spear/whale phishing attacks targeted at senior leaders/executives. These types of practical exercises help developers better understand the effects of such vulnerabilities and appreciate the need for security coding standards and processes."
    title: AT-3(3) - SECURITY TRAINING | PRACTICAL EXERCISES
    levels:
      - high
  - id: AT-3(4)
    status: not applicable
    notes: "This control reflects organizational procedure/policy and is not\napplicable to component-level configuration."
    rules: []
    description: "The organization provides training to its personnel on [Assignment: organization-defined indicators of malicious code] to recognize suspicious communications and anomalous behavior in organizational information systems.\n\nSupplemental Guidance:  A well-trained workforce provides another organizational safeguard that can be employed as part of a defense-in-depth strategy to protect organizations against malicious code coming in to organizations via email or the web applications. Personnel are trained to look for indications of potentially suspicious email (e.g., receiving an unexpected email, receiving an email containing strange or poor grammar, or receiving an email from an unfamiliar sender but who appears to be from a known sponsor or contractor). Personnel are also trained on how to respond to such suspicious email or web communications (e.g., not opening attachments, not clicking on embedded web links, and checking the source of email addresses). For this process\
      \ to work effectively, all organizational personnel are trained and made aware of what constitutes suspicious communications. Training personnel on how to recognize anomalous behaviors in organizational information systems can potentially provide early warning for the presence of malicious code. Recognition of such anomalous behavior by organizational personnel can supplement automated malicious code detection and protection tools and systems employed by organizations.\nAT-3 (4) [malicious code indicators as defined by organization  incident policy/capability]"
    title: AT-3(4) - SECURITY TRAINING | SUSPICIOUS COMMUNICATIONS AND ANOMALOUS SYSTEM BEHAVIOR
    levels:
      - high
  - id: AT-4
    status: not applicable
    notes: "Section a: This control reflects organizational procedure/policy and is not\napplicable to component-level configuration.\n\nSection b: This control reflects organizational procedure/policy and is not\napplicable to component-level configuration."
    rules: []
    description: "The organization:\n a. Documents and monitors individual information system security training activities including basic security awareness training and specific information system security training; and\n b. Retains individual training records for [Assignment: organization-defined time period].\n\nSupplemental Guidance:  Documentation for specialized training may be maintained by individual supervisors at the option of the organization. Related controls: AT-2, AT-3, PM-14.\n\nControl Enhancements:  None.\n\nReferences:  None.\n\nAT-4 (b) [five (5) years or 5 years after completion of a specific training program]"
    title: AT-4 - SECURITY TRAINING RECORDS
    levels:
      - high
      - moderate
      - low
  - id: AT-5
    status: not applicable
    notes: "As of NIST 800-53 rev4 this control was withdrawn\nand incorporated into PM-15."
    rules: []
  - id: AU-1
    status: not applicable
    notes: "Section a: Developing an organization-level audit and accountability\npolicy is outside the scope of OpenShift configuration.\n\nSection b: Review and updating an organizational-level audit and\naccountability policy is outside the scope of OpenShift\nconfiguration."
    rules: []
    description: "The organization:\n a. Develops, documents, and disseminates to [Assignment: organization-defined personnel or roles]:\n   1. An audit and accountability policy that addresses purpose, scope, roles, responsibilities, management commitment, coordination among organizational entities, and compliance; and\n   2.  Procedures to facilitate the implementation of the audit and accountability policy and associated audit and accountability controls; and\n b. Reviews and updates the current:\n   1. Audit and accountability policy [Assignment: organization-defined frequency]; and\n   2. Audit and accountability procedures [Assignment: organization-defined frequency].\n\nSupplemental Guidance:  This control addresses the establishment of policy and procedures for the effective implementation of selected security controls and control enhancements in the AU family. Policy and procedures reflect applicable federal laws, Executive Orders, directives, regulations, policies, standards, and\
      \ guidance. Security program policies and procedures at the organization level may make the need for system-specific policies and procedures unnecessary. The policy can be included as part of the general information security policy for organizations or conversely, can be represented by multiple policies reflecting the complex nature of certain organizations. The procedures can be established for the security program in general and for particular information systems, if needed. The organizational risk management strategy is a key factor in establishing policy and procedures. Related control: PM-9.\n\nControl Enhancements:  None.\n\nReferences:  NIST Special Publications 800-12, 800-100.\n\nAU-1 (b) (1) [at least annually]\nAU-1 (b) (2) [at least annually or whenever a significant change occurs]"
    title: "AU-1 - AUDIT AND ACCOUNTABILITY POLICY AND\nPROCEDURES"
    levels:
