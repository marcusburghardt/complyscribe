  - id: AC-8
    status: automated
    notes: "Section a: To configure a login banner for console logins via \"oc login\",\nensure a \"motd\" configMap in the openshift namespace exists.\nThe login message is set in the \"message\" key of the configMap:\n\n$ oc create cm motd --from-literal=message=\"this is the display banner\" -nopenshift\n\nTo configure a login banner for the webUI logins, please follow:\nhttps://docs.openshift.com/container-platform/latest/web_console/customizing-the-web-console.html#customizing-the-login-page_customizing-web-console\n\nSection b: To configure a login banner for console logins via \"oc login\",\nensure a \"motd\" configMap in the openshift namespace exists.\nThe login message is set in the \"message\" key of the configMap:\n\n$ oc create cm motd --from-literal=message=\"this is the display banner\" -nopenshift\n\nTo configure a login banner for the webUI logins, please follow:\nhttps://docs.openshift.com/container-platform/latest/web_console/customizing-the-web-console.html#customizing-the-login-page_customizing-web-console\n\
      \nThe login banner is displayed before the user logins in to the webUI,\nthus satisfying the control. For console logins, the login banner\nis displayed when the user acquires an OAuth token, but before they\nactually perform any action.\n\nSection c: The customer will be responsible for displaying a system use\ninformation message to users. A successful control response will need\nto address the conditions under which the message will be\ndisplayed (if a non-government user accesses the system, the system\nuse information message may not be appropriate), as well as the\ncontents of the notification message, including references to\napplicable monitoring, recording, or auditing, and authorized usage\nof the system.\n\nA control response to AC-8 is planned. Progress can be tracked\nvia:\n\nhttps://issues.redhat.com/browse/CMP-125\n\nSection c.1: The customer will be responsible for determining the conditions\nunder which the system use notification will be displayed. These\nconditions\
      \ must be reviewed and accepted by the FedRAMP JAB.\n\nA control response to AC-8 is planned. Progress can be tracked\nvia:\n\nhttps://issues.redhat.com/browse/CMP-125\n\nSection c.2: The customer will be responsible for how the system use notification\nwill be verified and how often it should be re-displayed and\nre-verified. These conditions must be reviewed an accepted by the\nFedRAMP JAB.\n\nA control response to AC-8 is planned. Progress can be tracked\nvia:\n\nhttps://issues.redhat.com/browse/CMP-125\n\nSection c.3: The customer will be responsible for verifying that the system use\nnotification is being displayed as required, either through a\nconfiguration baseline check or via other means. If this verification\ndoes not happen through a configuration baseline check, the JAB must\nreview and accept the process used to perform the verification.\n\nA control response to AC-8 is planned. Progress can be tracked\nvia:\n\nhttps://issues.redhat.com/browse/CMP-125"
    rules:
      - openshift_motd_exists
      - banner_or_login_template_set
    description: "The information system:\n a. Displays to users [Assignment: organization-defined system use notification message or banner] before granting access to the system that provides privacy and security notices consistent with applicable federal laws, Executive Orders, directives, policies, regulations, standards, and guidance and states that:\n   1. Users are accessing a U.S. Government information system;\n   2. Information system usage may be monitored, recorded, and subject to audit;\n   3. Unauthorized use of the information system is prohibited and subject to criminal and civil penalties; and\n   4. Use of the information system indicates consent to monitoring and recording;\n b. Retains the notification message or banner on the screen until users acknowledge the usage conditions and take explicit actions to log on to or further access the information system; and \n c. For publicly accessible systems:\n   1. Displays system use information [Assignment: organization-defined\
      \ conditions], before granting further access;\n   2. Displays references, if any, to monitoring, recording, or auditing that are consistent with privacy accommodations for such systems that generally prohibit those activities; and\n   3. Includes a description of the authorized uses of the system.\n\nSupplemental Guidance:  System use notifications can be implemented using messages or warning banners displayed before individuals log in to information systems. System use notifications are used only for access via logon interfaces with human users and are not required when such human interfaces do not exist. Organizations consider system use notification messages/banners displayed in multiple languages based on specific organizational needs and the demographics of information system users. Organizations also consult with the Office of the General Counsel for legal review and approval of warning banner content.\n\nControl Enhancements:  None.\n\nReferences: None.\n\n\nAC-8 (a) [see additional\
      \ Requirements and Guidance]\nAC-8 (c) [see additional Requirements and Guidance]\nAC-8 Requirement: The service provider shall determine elements of the cloud environment that require the System Use Notification control. The elements of the cloud environment that require System Use Notification are approved and accepted by the JAB/AO. \nRequirement: The service provider shall determine how System Use Notification is going to be verified and provide appropriate periodicity of the check. The System Use Notification verification and periodicity are approved and accepted by the JAB/AO.\nGuidance: If performed as part of a Configuration Baseline check, then the % of items requiring setting that are checked and that pass (or fail) check can be provided. \nRequirement: If not performed as part of a Configuration Baseline check, then there must be documented agreement on how to provide results of verification and the necessary periodicity of the verification by the service provider. The documented\
      \ agreement on how to provide verification of the results are approved and accepted by the JAB/AO."
    title: AC-8 - SYSTEM USE NOTIFICATION
    levels:
      - high
      - moderate
      - low
