    notes: "Security policy filters for data structures can check for maximum file lengths,\nmaximum field sizes, and data/file types (for structured and unstructured data)\ncan be met by OpenShift.\n\nAll of OpenShift extends the Kubernetes API with custom resource definitions.\nThe api has built-in limits and there are additional validations we can perform. [1]\n\nHowever security policy filters for data content which checks for specific words enumerated values\nor data value ranges, and hidden content, are an organizational control outside the scope of\nOpenShift configuration.\n\n[1] https://kubernetes.io/docs/tasks/extend-kubernetes/custom-resources/custom-resource-definitions/#validation-rules"
    rules: []
    description: "The information system enforces information flow control using [Assignment: organization-defined security policy filters] as a basis for flow control decisions for [Assignment: organization-defined information flows].\n\nSupplemental Guidance:  Organization-defined security policy filters can address data structures and content. For example, security policy filters for data structures can check for maximum file lengths, maximum field sizes, and data/file types (for structured and unstructured data). Security policy filters for data content can check for specific words (e.g., dirty/clean word filters), enumerated values or data value ranges, and hidden content. Structured data permits the interpretation of data content by applications. Unstructured data typically refers to digital information without a particular data structure or with a data structure that does not facilitate the development of rule sets to address the particular sensitivity of the information conveyed\
      \ by the data or the associated flow enforcement decisions. Unstructured data consists of: (i) bitmap objects that are inherently non language-based (i.e., image, video, or audio files); and (ii) textual objects that are based on written or printed languages (e.g., commercial off-the- shelf word processing documents, spreadsheets, or emails). Organizations can implement more than one security policy filter to meet information flow control objectives (e.g., employing clean word lists in conjunction with dirty word lists may help to reduce false positives)."
    title: AC-4(8) - INFORMATION FLOW ENFORCEMENT | SECURITY POLICY FILTERS
    levels:
      - high
