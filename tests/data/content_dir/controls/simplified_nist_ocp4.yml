  - id: AC-14
    status: not applicable
    notes: "Regardless of access mechanism, such as the OpenShift Console or remote\naccess attempts through SSH, unauthenticated users will only be shown the\nsystem use notifications (as defined in AC-8) and login prompt. This is\nnon-configurable behavior."
    rules: []
    description: "The organization:\n a. Identifies [Assignment: organization-defined user actions] that can be performed on the information system without identification or authentication consistent with organizational missions/business functions; and\n b. Documents and provides supporting rationale in the security plan for the information system, user actions not requiring identification or authentication.\n\nSupplemental Guidance:  This control addresses situations in which organizations determine that no identification or authentication is required in organizational information systems. Organizations may allow a limited number of user actions without identification or authentication including, for example, when individuals access public websites or other publicly accessible federal information systems, when individuals use mobile phones to receive calls, or when facsimiles are received. Organizations also identify actions that normally require identification or authentication but may\
      \ under certain circumstances (e.g., emergencies), allow identification or authentication mechanisms to be bypassed. Such bypasses may occur, for example, via a software-readable physical switch that commands bypass of the logon functionality and is protected from accidental or unmonitored use. This control does not apply to situations where identification and authentication have already occurred and are not repeated, but rather to situations where identification and authentication have not yet occurred. Organizations may decide that there are no user actions that can be performed on organizational information systems without identification and authentication and thus, the values for assignment statements can be none. Related controls: CP-2, IA-2.\n\nControl Enhancements:  None.\n\n(1)   PERMITTED ACTIONS WITHOUT IDENTIFICATION OR AUTHENTICATION | NECESSARY USES\n[Withdrawn: Incorporated into AC-14]. \n\nReferences:  None."
    title: "AC-14 - PERMITTED ACTIONS WITHOUT IDENTIFICATION OR\nAUTHENTICATION"
