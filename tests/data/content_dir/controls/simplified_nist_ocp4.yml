    rules: []
    description: "The organization identifies and explicitly authorizes users allowed to independently configure wireless networking capabilities.\n\nSupplemental Guidance:  Organizational authorizations to allow selected users to configure wireless networking capability are enforced in part, by the access enforcement mechanisms employed within organizational information systems. Related controls: AC-3, SC-15."
    title: AC-18(4) - WIRELESS ACCESS | RESTRICT CONFIGURATIONS BY USERS
    levels:
