---
apiVersion: v1
kind: Pod
metadata:
  name: complyscribe-e2e-pod
  labels:
    app: complyscribe-e2e
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
  containers:
    - name: mock-server-container
      image: localhost/mock-server:latest
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
          add:
            - NET_BIND_SERVICE
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: tmp
          mountPath: /home/wiremock
  volumes:
    - name: tmp
      emptyDir: {}
